name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: looklocker-t1map

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true

          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
            use_zigbuild: false

          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            use_zigbuild: false

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            use_zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: |
          pip3 install ziglang --quiet
          cargo install cargo-zigbuild --locked --quiet

      - name: Build (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_zigbuild"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Set archive name
        shell: bash
        run: echo "ARCHIVE_NAME=${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${BINARY_NAME}"
          mkdir dist
          cp "$BIN" dist/
          cp README.md dist/ 2>/dev/null || true
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C dist .
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\${env:BINARY_NAME}.exe"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $bin dist\
          if (Test-Path README.md) { Copy-Item README.md dist\ }
          Compress-Archive -Path dist\* -DestinationPath "${env:ARCHIVE_NAME}.zip"
          echo "ASSET=${env:ARCHIVE_NAME}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
