name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: looklocker-t1map

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true

          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            use_zigbuild: true

          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            use_zigbuild: false

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            use_zigbuild: false

    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*= "\(.*\)"/\1/')"
          if [ "${{ github.ref_name }}" != "$CARGO_VERSION" ]; then
            echo "Tag ${{ github.ref_name }} does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install zig (Linux)
        if: matrix.use_zigbuild && runner.os == 'Linux'
        run: pip3 install ziglang --quiet

      - name: Install zig (macOS)
        if: matrix.use_zigbuild && runner.os == 'macOS'
        run: brew install zig

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild --locked --quiet

      - name: Build (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_zigbuild"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Set archive name
        shell: bash
        run: echo "ARCHIVE_NAME=${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${BINARY_NAME}"
          mkdir dist
          cp "$BIN" dist/
          cp README.md dist/ 2>/dev/null || true
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C dist .
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\${env:BINARY_NAME}.exe"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $bin dist\
          if (Test-Path README.md) { Copy-Item README.md dist\ }
          Compress-Archive -Path dist\* -DestinationPath "${env:ARCHIVE_NAME}.zip"
          echo "ASSET=${env:ARCHIVE_NAME}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*

  docker:
    name: Build and push Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
